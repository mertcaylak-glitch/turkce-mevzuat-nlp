services:
  neo4j:
    image: neo4j:5-community
    container_name: mevzuat-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protokolü (Python driver bu portu kullanır)
    environment:
      - NEO4J_AUTH=neo4j/mevzuat-dev-2026
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs: